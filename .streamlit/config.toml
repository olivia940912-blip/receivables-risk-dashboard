[theme]
base = "light"
primaryColor = "#2a78d6"
backgroundColor = "#f4f6f9"
secondaryBackgroundColor = "#ffffff"
textColor = "#0b0b0b"
linkColor = "#2a78d6"
font = "system-ui, -apple-system, 'Segoe UI', 'Malgun Gothic', Roboto, 'Helvetica Neue', Arial, sans-serif"
headingFont = "system-ui, -apple-system, 'Segoe UI', 'Malgun Gothic', Roboto, 'Helvetica Neue', Arial, sans-serif"
codeFont = "monospace"
baseRadius = "medium"
buttonRadius = "medium"
borderColor = "#e1e0d9"
showWidgetBorder = true
showSidebarBorder = false
